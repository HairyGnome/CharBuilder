name: Quasar Deploy & Electron Release

on:
  push:
    branches:
      - rel

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 24
    steps:
      # 1. Checkout code
      - uses: actions/checkout@v3

      # 2. Setup Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # 3. Install dependencies
      - run: npm ci

      # 4. Build Quasar web project
      - name: Build Quasar Web
        run: npm run web:build

      # 5. Upload web build artifact
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/pwa

  build-electron:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      NODE_VERSION: 24
    steps:
      # 1. Checkout code
      - uses: actions/checkout@v3

      # 2. Setup Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # 3. Install dependencies
      - run: npm ci

      # 4. Build Electron app
      - name: Build Electron App
        run: npm run electron:build

      # 5. Create archives and rename for release
      - name: Create Archives
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ] || [ "$RUNNER_OS" = "macOS" ]; then
            BASE_DIR="dist/electron"
            if [ -d "dist/electron/Packaged" ]; then
              BASE_DIR="dist/electron/Packaged"
            fi
            cd "$BASE_DIR"
            mkdir -p ../releases
            for dir in */; do
              [ "$dir" = "releases/" ] && continue
              [ "$dir" = "UnPackaged/" ] && continue
              name="${dir%/}"
              case "$name" in
                *win32*) out="Windows-x64.zip" ;;
                *linux*) out="Linux-x64.zip" ;;
                *darwin*|*mac*) out="macOS-x64.zip" ;;
                *) out="${name}.zip" ;;
              esac
              zip -r "../releases/$out" "$name"
            done
          fi

      - name: Create Archives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $SourceDir = "dist/electron"
          if (Test-Path "dist/electron/Packaged") {
            $SourceDir = "dist/electron/Packaged"
          }

          Write-Host "Source directory: $SourceDir"
          $ReleaseDir = "$SourceDir/releases"
          if (-not (Test-Path $ReleaseDir)) {
            New-Item -ItemType Directory -Force -Path $ReleaseDir | Out-Null
          }

          $items = Get-ChildItem -Path $SourceDir -Directory | Where-Object { $_.Name -notin @("UnPackaged", "releases") }
          Write-Host "Found $($items.Count) directories to archive"

          $items | ForEach-Object {
            $dir = $_
            $zipName = if ($dir.Name -like "*win32*") { "Windows-x64.zip" } elseif ($dir.Name -like "*linux*") { "Linux-x64.zip" } elseif ($dir.Name -like "*darwin*") { "macOS-x64.zip" } else { "$($dir.Name).zip" }
            $zipPath = Join-Path $ReleaseDir $zipName
            Write-Host "Archiving $($dir.Name) to $zipName"
            Compress-Archive -Path $dir.FullName -DestinationPath $zipPath -Force
            Write-Host "Created: $zipName"
          }

          Write-Host "Contents of releases directory:"
          Get-ChildItem -Path $ReleaseDir | ForEach-Object { Write-Host "  $($_.Name)" }

      # 6. Upload electron build artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: electron-build-${{ matrix.os }}
          path: dist/electron/releases/*.zip

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      # 1. Download web build
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/pwa

      # 2. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/pwa
          publish_branch: gh-pages
          force_orphan: true

  release:
    needs: build-electron
    runs-on: ubuntu-latest
    steps:
      # 1. Download electron build
      - uses: actions/download-artifact@v4
        with:
          pattern: electron-build-*
          merge-multiple: true
          path: dist/electron/releases

      # 2. Create Release and Upload Artifacts
      - name: Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Electron Build v${{ github.run_number }}
          body: Electron build for commit ${{ github.sha }}
          files: dist/electron/releases/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
