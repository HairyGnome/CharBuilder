name: Quasar Deploy & Electron Release

on:
  push:
    branches:
      - rel

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 24
    steps:
      # 1. Checkout code
      - uses: actions/checkout@v3

      # 2. Setup Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # 3. Install dependencies
      - run: npm ci

      # 4. Build Quasar web project
      - name: Build Quasar Web
        run: npm run web:build

      # 5. Upload web build artifact
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/pwa

  build-electron:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      NODE_VERSION: 24
    steps:
      # 1. Checkout code
      - uses: actions/checkout@v3

      # 2. Setup Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # 3. Install dependencies
      - run: npm ci

      # 4. Build Electron app
      - name: Build Electron App
        run: npm run electron:build

      # 5. Create archives and rename for release
      - name: Create Archives
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ] || [ "$RUNNER_OS" = "macOS" ]; then
            BASE_DIR="dist/electron"
            if [ -d "dist/electron/Packaged" ]; then
              BASE_DIR="dist/electron/Packaged"
            fi
            cd "$BASE_DIR"
            mkdir -p ../releases
            for dir in */; do
              [ "$dir" = "releases/" ] && continue
              [ "$dir" = "UnPackaged/" ] && continue
              name="${dir%/}"
              case "$name" in
                *win32*) out="Windows-x64.zip" ;;
                *linux*) out="Linux-x64.zip" ;;
                *darwin*|*mac*) out="macOS-x64.zip" ;;
                *) out="${name}.zip" ;;
              esac
              zip -r "../releases/$out" "$name"
            done
          fi

      - name: Create Archives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BASE_DIR = "dist/electron"
          if (Test-Path "dist/electron/Packaged") {
            $BASE_DIR = "dist/electron/Packaged"
          }
          Write-Host "BASE_DIR: $($BASE_DIR)"
          Write-Host "Contents of $($BASE_DIR):"
          Get-ChildItem -Path $BASE_DIR -Directory | ForEach-Object { Write-Host "  $($_.Name)" }

          if (-not (Test-Path "$BASE_DIR/releases")) {
            New-Item -ItemType Directory -Path "$BASE_DIR/releases" | Out-Null
          }

          Get-ChildItem -Path $BASE_DIR -Directory | Where-Object { $_.Name -ne "UnPackaged" -and $_.Name -ne "releases" } | ForEach-Object {
            $name = $_.Name
            if ($name -like "*win32*") {
              $out = "Windows-x64.zip"
            } elseif ($name -like "*linux*") {
              $out = "Linux-x64.zip"
            } elseif ($name -like "*darwin*") {
              $out = "macOS-x64.zip"
            } else {
              $out = "$name.zip"
            }
            Write-Host "Archiving $name to $out"
            Compress-Archive -Path "$BASE_DIR/$name" -DestinationPath "$BASE_DIR/releases/$out" -Force
          }

          Write-Host "Final releases:"
          Get-ChildItem -Path "$BASE_DIR/releases" | ForEach-Object { Write-Host "  $($_.Name)" }

      # 6. Upload electron build artifact
      - uses: actions/upload-artifact@v4
        with:
          name: electron-build-${{ matrix.os }}
          path: dist/electron/releases/*.zip

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      # 1. Download web build
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/pwa

      # 2. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/pwa
          publish_branch: gh-pages
          force_orphan: true

  release:
    needs: build-electron
    runs-on: ubuntu-latest
    steps:
      # 1. Download electron build
      - uses: actions/download-artifact@v4
        with:
          pattern: electron-build-*
          merge-multiple: true
          path: dist/electron/releases

      # 2. Create Release and Upload Artifacts
      - name: Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Electron Build v${{ github.run_number }}
          body: Electron build for commit ${{ github.sha }}
          files: dist/electron/releases/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
